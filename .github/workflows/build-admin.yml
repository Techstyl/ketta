name: Build Admin App

on:
  workflow_dispatch:

jobs:
  apk:
    name: Build Admin APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Install Android SDK platform
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" 2>/dev/null || true
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: 'stable'
      - run: flutter pub get
        working-directory: ketta_admin
      - run: flutter build apk --release
        working-directory: ketta_admin
      - uses: actions/upload-artifact@v4
        with:
          name: ketta-admin-apk
          path: ketta_admin/build/app/outputs/flutter-apk/app-release.apk

  web:
    name: Build Admin Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: 'stable'
      - run: flutter pub get
        working-directory: ketta_admin
      - run: flutter build web --release
        working-directory: ketta_admin
      - uses: actions/upload-pages-artifact@v3
        with:
          name: ketta-admin-web
          path: ketta_admin/build/web
